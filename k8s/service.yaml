apiVersion: v1
kind: Service
metadata:
  name: kafka-agent
  labels:
    app: kafka-agent
spec:
  selector:
    app: kafka-agent
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
  type: LoadBalancer
  # For GKE: set type: LoadBalancer
  # For internal-only: set type: ClusterIP
  # For NodePort access: set type: NodePort
