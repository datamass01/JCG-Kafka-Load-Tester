apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-agent
  labels:
    app: kafka-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-agent
  template:
    metadata:
      labels:
        app: kafka-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: kafka-agent
          image: kafka-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kafka-agent-config
                  key: KAFKA_BROKERS
                  optional: true
            - name: DATA_DIR
              value: /data
          volumeMounts:
            - name: config
              mountPath: /etc/kafka-agent
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: kafka-agent-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: data
          persistentVolumeClaim:
            claimName: kafka-agent-data
