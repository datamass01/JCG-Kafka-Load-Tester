kafka_instances:
  - name: "kafka-cluster"
    brokers:
      - "kafka:9092"
      - "kafka2:9092"
      - "kafka3:9092"
    version: "3.6.0"

active_instance: "kafka-cluster"

# Legacy single-instance section — used when kafka_instances is absent (env-var deployments).
kafka:
  brokers:
    - "localhost:9092"
  sasl:
    enabled: false
    mechanism: "PLAIN"
    username: ""
    password: ""
  tls:
    enabled: false
    skip_verify: false
  version: "3.6.0"

load_test:
  topic: "load-test"
  partitions: 3
  replication_factor: 3
  min_insync_replicas: 2
  workers: 10
  target_msg_per_sec: 1000
  message_size_bytes: 1024
  duration_seconds: 0
  key_strategy: "random"
  value_strategy: "random"

dashboard:
  host: "0.0.0.0"
  port: 8080

storage:
  data_dir: "/data"
  metrics_retention_hours: 24
  rotation_size_mb: 50
